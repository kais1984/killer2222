{% extends "base.html" %}
{% load static %}

{% block title %}Sales Dashboard - RIMAN FASHION ERP{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row mb-4">
        <div class="col-md-12">
            <h1 class="mb-3"><i data-feather="shopping-cart"></i> Sales Management</h1>
        </div>
    </div>
    
    <!-- KPI Cards -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card">
                <div class="card-body">
                    <h6 class="card-title text-muted">Total Invoices</h6>
                    <h3>{{ invoices|length }}</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card">
                <div class="card-body">
                    <h6 class="card-title text-muted">Total Sales</h6>
                    <h3>{{ sales|length }}</h3>
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="row mb-4">
        <div class="col-md-12">
            <a href="{% url 'sale_list' %}" class="btn btn-primary me-2">View Sales</a>
            <a href="{% url 'invoice_list' %}" class="btn btn-secondary">View Invoices</a>
        </div>
    </div>
</div>
{% endblock %}
