{% extends "base.html" %}
{% load static %}

{% block title %}Suppliers Dashboard - RIMAN FASHION ERP{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row mb-4">
        <div class="col-md-12">
            <h1 class="mb-3"><i data-feather="truck"></i> Suppliers Management</h1>
        </div>
    </div>
    
    <!-- KPI Cards -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card">
                <div class="card-body">
                    <h6 class="card-title text-muted">Total Suppliers</h6>
                    <h3>{{ suppliers|length }}</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card">
                <div class="card-body">
                    <h6 class="card-title text-muted">Purchase Orders</h6>
                    <h3>{{ orders|length }}</h3>
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="row mb-4">
        <div class="col-md-12">
            <a href="{% url 'supplier_list' %}" class="btn btn-primary me-2">View Suppliers</a>
            <a href="{% url 'purchase_order_list' %}" class="btn btn-secondary">View Orders</a>
        </div>
    </div>
</div>
{% endblock %}
